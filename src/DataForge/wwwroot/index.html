<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Converta e filtre arquivos CSV, JSON ou XML de forma simples e rápida.">
    <meta name="author" content="Gabriel Teramae">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Transformador de arquivos">
    <meta property="og:description" content="Converta e filtre arquivos CSV, JSON ou XML de forma simples e rápida.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Transformador de arquivos">
    <meta name="twitter:description" content="Converta e filtre arquivos CSV, JSON ou XML de forma simples e rápida.">
    <title>Transformador de arquivos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="wrap">
        <h1>Transformador de arquivos</h1>
        <p class="sub">Converta e filtre arquivos CSV, JSON ou XML.</p>

        <div class="card">
            <p class="card-title">Arquivo</p>
            <div class="drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p>Arraste um arquivo ou clique para selecionar</p>
                <span>CSV, JSON ou XML</span>
                <div class="file-name" id="fileName"></div>
            </div>
            <input type="file" id="fileInput" accept=".csv,.json,.xml" style="display:none">
        </div>

        <div class="card">
            <p class="card-title">Transformações</p>
            <div class="row">
                <div>
                    <label>Filtro</label>
                    <input type="text" id="filter" placeholder="ex: idade>18 ou status=ativo">
                </div>
                <div>
                    <label>Colunas (separadas por vírgula)</label>
                    <input type="text" id="columns" placeholder="ex: nome,email,idade">
                </div>
                <div>
                    <label>Renomear colunas</label>
                    <input type="text" id="rename" placeholder="ex: name:nome,email:correio">
                </div>
            </div>
        </div>

        <div class="card">
            <p class="card-title">Formato de saída</p>
            <div class="seg" id="fmt">
                <button class="active" data-val="json">JSON</button>
                <button data-val="csv">CSV</button>
                <button data-val="xml">XML</button>
            </div>
        </div>

        <button class="btn-run" onclick="transformar()">Transformar</button>

        <div class="result" id="result">
            <div class="card">
                <p class="card-title">Resultado</p>
                <div class="result-header">
                    <div>
                        <span class="badge" id="statusBadge">ok</span>
                        <span class="meta" id="metaInfo"></span>
                    </div>
                    <button class="copy-btn" onclick="copiar()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                        copiar
                    </button>
                </div>
                <hr class="divider">
                <pre id="output"></pre>
            </div>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>

</html>
