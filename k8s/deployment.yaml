apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataforge
  labels:
    app: dataforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dataforge
  template:
    metadata:
      labels:
        app: dataforge
    spec:
      containers:
        - name: dataforge
          image: your-dockerhub-user/dataforge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/transform/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/transform/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
