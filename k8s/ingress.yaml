apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dataforge-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: dataforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dataforge-service
                port:
                  number: 80
